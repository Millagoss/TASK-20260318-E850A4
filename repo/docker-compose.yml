services:
  db:
    image: postgres:15-alpine
    container_name: activity_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: activity_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - WHITELIST_ENCRYPTION_KEY=${WHITELIST_ENCRYPTION_KEY:?WHITELIST_ENCRYPTION_KEY is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - FEATURE_DUPLICATE_CHECK=${FEATURE_DUPLICATE_CHECK:-false}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: activity_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000}
    # environment:
    #   - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  # Daily pg_dump into shared backups volume (first dump after ~60s, then every 24h UTC wall-clock from container start)
  backup_scheduler:
    image: postgres:15-alpine
    container_name: activity_backup_scheduler
    depends_on:
      - db
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - backups_data:/backups
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        sleep 60
        while true; do
          TS=$$(date +%Y%m%d_%H%M%S)
          pg_dump -h db -U "$$POSTGRES_USER" "$$POSTGRES_DB" > "/backups/scheduled_$${TS}.sql" 2>>/backups/scheduler.log || true
          sleep 86400
        done

volumes:
  db_data:
  uploads_data:
  backups_data: